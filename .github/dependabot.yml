version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      ## reason: "Temporary compatibility issues. Revisit after migration to Python 3.13."
      - dependency-name: "playwright"
    labels:
      - "pip-dependencies"

  # Disable npm scanning - npm manifests are transient artifacts from Playwright, not part of this Python project
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "*"
